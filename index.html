<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simandou – Spares Register (Read Only)</title>
<style>
:root{
  --bg:#f0f2f5; --surface:#ffffff; --surface2:#f8f9fb;
  --border:#d0d5dd; --border2:#a0aab8;
  --accent:#b45309; --accent2:#92400e;
  --text:#0f1117; --text2:#2d3748; --text3:#5a6478;
  --comm:#1d4ed8; --comm-bg:#dbeafe; --comm-t:#1e3a8a;
  --ci:#6d28d9;   --ci-bg:#ede9fe;   --ci-t:#4c1d95;
  --ops:#047857;  --ops-bg:#d1fae5;  --ops-t:#064e3b;
  --st:#b45309;   --st-bg:#fef3c7;   --st-t:#78350f;
  --pres:#b91c1c; --pres-bg:#fee2e2; --pres-t:#7f1d1d;
  --abb:#0066b3;  --abb-bg:#e0f0ff;  --abb-t:#003d6b;
  --tak:#cc4400;  --tak-bg:#fff0e8;  --tak-t:#7a2800;
  --shadow:0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;font-size:14px;line-height:1.5}

/* ── TOP BAR ── */
.topbar{background:var(--surface);border-bottom:2px solid var(--border);padding:0 18px;
  display:flex;align-items:center;gap:10px;height:58px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.logo{font-family:'Courier New',monospace;font-size:12px;font-weight:700;letter-spacing:3px;color:var(--accent);white-space:nowrap}
.logo span{color:var(--text3)}
.sep{width:1px;height:28px;background:var(--border);flex-shrink:0}

/* ── TWO-ROW TAB SYSTEM ── */
.nav{display:flex;flex-direction:column;flex:1;overflow:hidden}
.nav-row{display:flex;gap:3px;overflow-x:auto;padding:3px 0 2px}
.nav-row::-webkit-scrollbar{height:0}

/* Group labels */
.nav-grp{display:flex;align-items:center;gap:3px;padding-right:10px;border-right:1px solid var(--border);margin-right:6px;flex-shrink:0}
.nav-grp-lbl{font-family:'Courier New',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding-right:5px;white-space:nowrap}

.tab{padding:5px 12px;font-size:11.5px;font-family:'Courier New',monospace;letter-spacing:.4px;
  cursor:pointer;border-radius:5px;color:var(--text2);background:none;border:1.5px solid transparent;
  white-space:nowrap;transition:all .15s;font-weight:600}
.tab:hover{background:var(--surface2);border-color:var(--border)}
.tab.active{border-color:currentColor;font-weight:700}

/* Row 1 – Views */
.tab-dash.active   {color:var(--accent);background:#fef3c7;border-color:var(--accent)}
.tab-mm.active     {color:#374151;background:#f3f4f6;border-color:#6b7280}
.tab-abb.active    {color:var(--abb-t);background:var(--abb-bg);border-color:var(--abb)}
.tab-tak.active    {color:var(--tak-t);background:var(--tak-bg);border-color:var(--tak)}
.tab-pres.active   {color:var(--pres-t);background:var(--pres-bg);border-color:var(--pres)}
.tab-log.active    {color:#1e3a8a;background:#dbeafe;border-color:#1d4ed8}

/* Row 2 – Commodity filters (only shown when relevant) */
.tab-comm.active{color:var(--comm-t);background:var(--comm-bg);border-color:var(--comm)}
.tab-ci.active  {color:var(--ci-t);  background:var(--ci-bg);  border-color:var(--ci)}
.tab-ops.active {color:var(--ops-t); background:var(--ops-bg); border-color:var(--ops)}
.tab-st.active  {color:var(--st-t);  background:var(--st-bg);  border-color:var(--st)}
.tab-all.active {color:#374151;background:#f3f4f6;border-color:#6b7280}

.topbtns{display:flex;gap:8px;flex-shrink:0}
.btn{padding:7px 14px;background:var(--surface2);color:var(--text2);border:1.5px solid var(--border);
  border-radius:6px;font-size:12px;cursor:pointer;font-family:'Courier New',monospace;font-weight:600;transition:all .15s}
.btn:hover{background:var(--border);color:var(--text)}
.btn-add{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-add:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-print{background:#065f46;color:#fff;border-color:#065f46}
.btn-print:hover{background:#047857}

/* ── CONTENT ── */
.content{padding:16px 18px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(112px,1fr));gap:9px;margin-bottom:18px}
.metric{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:12px;box-shadow:var(--shadow)}
.metric .val{font-size:26px;font-weight:700;color:var(--text);font-family:'Courier New',monospace}
.metric .lbl{font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-top:3px;font-family:'Courier New',monospace}
.metric.hi{border-color:var(--accent)}.metric.hi .val{color:var(--accent)}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
@media(max-width:700px){.dash-row{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:14px;box-shadow:var(--shadow)}
.panel-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);
  font-family:'Courier New',monospace;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer}
.bar-row:hover .bar-label{color:var(--text)}
.bar-label{width:105px;color:var(--text2);flex-shrink:0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:var(--bg);border-radius:3px;height:7px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.bar-num{width:36px;text-align:right;color:var(--text3);font-size:12px;font-family:'Courier New',monospace}

/* ── OEM BANNER ── */
.oem-banner{border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.oem-banner .oem-name{font-size:18px;font-weight:700;font-family:'Courier New',monospace;letter-spacing:1px}
.oem-banner .oem-stats{display:flex;gap:14px;flex-wrap:wrap}
.oem-stat{text-align:center}
.oem-stat .sv{font-size:20px;font-weight:700;font-family:'Courier New',monospace}
.oem-stat .sl{font-size:10px;letter-spacing:1px;text-transform:uppercase;font-family:'Courier New',monospace;opacity:.8}

/* ── COMM FILTER BAR (row 2) ── */
.comm-filter{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.comm-filter-lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-family:'Courier New',monospace;margin-right:4px}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.srch{flex:1;min-width:200px;position:relative}
.srch input{width:100%;padding:9px 12px 9px 34px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:7px;color:var(--text);font-family:Georgia,serif;font-size:14px}
.srch input::placeholder{color:var(--text3)}
.srch input:focus{outline:none;border-color:var(--accent)}
.fsel{padding:9px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:7px;
  color:var(--text2);font-family:Georgia,serif;font-size:14px;cursor:pointer}
.fsel:focus{outline:none;border-color:var(--accent)}
.srch-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.rcount{font-size:13px;color:var(--text3);white-space:nowrap;font-family:'Courier New',monospace}

/* ── TABLE ── */
.twrap{overflow-x:auto;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;min-width:1100px}
th{text-align:left;padding:10px 8px;font-size:10px;letter-spacing:.8px;text-transform:uppercase;
  color:var(--text2);background:var(--surface2);border-bottom:2px solid var(--border);
  white-space:nowrap;font-weight:700;cursor:pointer;user-select:none;font-family:'Courier New',monospace}
th:hover{color:var(--text);background:var(--border)}
th.asc::after{content:' ▲'}th.desc::after{content:' ▼'}
td{padding:9px 8px;border-bottom:1px solid var(--border);color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;font-size:13px}
tr:hover td{background:#fefce8}
tr:nth-child(even) td{background:var(--surface2)}
tr:nth-child(even):hover td{background:#fefce8}
tr:last-child td{border-bottom:none}
.qty-low{color:#b45309!important;font-weight:700!important}
.qty-zero{color:#b91c1c!important;font-weight:700!important;background:#fee2e2!important}

/* ── BADGES ── */
.b{display:inline-block;padding:3px 7px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:.4px;font-family:'Courier New',monospace}
.bCOMM{background:var(--comm-bg);color:var(--comm-t);border:1.5px solid #93c5fd}
.bCI  {background:var(--ci-bg);  color:var(--ci-t);  border:1.5px solid #c4b5fd}
.b2YR {background:var(--ops-bg); color:var(--ops-t); border:1.5px solid #6ee7b7}
.bST  {background:var(--st-bg);  color:var(--st-t);  border:1.5px solid #fcd34d}
.bY{background:#fee2e2;color:#991b1b;border:1.5px solid #fca5a5;font-size:11px;padding:2px 6px}
.bN{background:#f1f5f9;color:var(--text3);border:1.5px solid var(--border);font-size:11px;padding:2px 6px}
.bABB{background:var(--abb-bg);color:var(--abb-t);border:1.5px solid #93c5fd;font-size:10px}
.bTAK{background:var(--tak-bg);color:var(--tak-t);border:1.5px solid #fdba74;font-size:10px}

.abtn{padding:4px 8px;font-size:11px;border-radius:5px;cursor:pointer;font-family:'Courier New',monospace;
  font-weight:600;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2)}
.abtn:hover{background:var(--border);color:var(--text)}
.abtn.del:hover{background:#fee2e2;border-color:#fca5a5;color:#b91c1c}
.abtn.issue{background:#dbeafe;border-color:#93c5fd;color:#1e3a8a}
.abtn.issue:hover{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.empty{text-align:center;padding:56px 20px;color:var(--text3);font-size:15px}

/* ── PAGER ── */
.pager{display:flex;align-items:center;gap:10px;padding:12px 0 4px;font-size:13px;color:var(--text3)}
.pbtn{padding:6px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;
  color:var(--text2);cursor:pointer;font-family:'Courier New',monospace;font-size:12px}
.pbtn:hover:not(:disabled){background:var(--border);color:var(--text)}
.pbtn:disabled{opacity:.4;cursor:default}
.pinfo{flex:1;text-align:center;font-family:'Courier New',monospace}

/* ── PRES CARDS ── */
.pcard{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;
  padding:10px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.pcard:hover{border-color:var(--border2);background:#fffbeb}
.ptag{font-size:12px;color:var(--text3);min-width:65px;flex-shrink:0;font-family:'Courier New',monospace}
.pdesc{flex:1;font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pint{font-size:11px;color:#7c2d12;background:#fff7ed;border:1.5px solid #fb923c;border-radius:5px;
  padding:2px 8px;min-width:130px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;font-family:'Courier New',monospace}

/* ── MODALS ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.ov.show{display:flex}
.modal{background:var(--surface);border:1.5px solid var(--border2);border-radius:12px;padding:24px;
  width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal.narrow{width:460px}
.modal h2{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:18px;font-family:'Courier New',monospace}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);font-family:'Courier New',monospace;font-weight:700}
.fg input,.fg select,.fg textarea{padding:9px 10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:Georgia,serif;font-size:14px}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:52px}
.mact{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.mcancel{padding:9px 16px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);border-radius:7px;cursor:pointer;font-family:'Courier New',monospace;font-size:13px}
.mcancel:hover{background:var(--border)}
.msave{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:7px;cursor:pointer;font-family:'Courier New',monospace;font-size:13px;font-weight:700;letter-spacing:1px}
.msave:hover{background:var(--accent2)}
.missue{padding:9px 22px;background:#1d4ed8;color:#fff;border:none;border-radius:7px;cursor:pointer;font-family:'Courier New',monospace;font-size:13px;font-weight:700}
.missue:hover{background:#1e3a8a}
.stock-info{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:16px}
.stock-val{font-size:22px;font-weight:700;font-family:'Courier New',monospace}
.stock-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-family:'Courier New',monospace}
.issue-warn{color:#b91c1c;font-size:12px;font-family:'Courier New',monospace;margin-top:6px;min-height:18px}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>

<style media="print">
@page{size:A4 landscape;margin:10mm 8mm 8mm 8mm}
body{background:#fff!important;color:#000!important;font-family:Arial,Helvetica,sans-serif;font-size:8.5pt}
.topbar,.toolbar,.pager,.topbtns,.mact,.abtn,.ov,.metrics,.dash-row,.pcard,.empty,.oem-banner,.comm-filter{display:none!important}
.content{padding:0!important}
.twrap{border:none!important;border-radius:0!important;overflow:visible!important}
table{min-width:unset!important;width:100%!important;border-collapse:collapse!important;font-size:7.5pt!important;table-layout:fixed!important}
th{background:#1a1a2e!important;color:#fff!important;font-size:7pt!important;padding:3pt 4pt!important;border:0.5pt solid #888!important;white-space:normal!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
td{padding:2.5pt 4pt!important;border:0.5pt solid #ccc!important;color:#000!important;white-space:normal!important;background:#fff!important;overflow:visible!important}
tr:nth-child(even) td{background:#f7f7f7!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
tr:hover td{background:unset!important}
thead{display:table-header-group}tr{page-break-inside:avoid}
.b{background:none!important;border:0.5pt solid #999!important;color:#000!important;padding:0 3pt!important;font-size:7pt!important}
.bY{color:#c0392b!important;border-color:#c0392b!important;font-weight:700}
th.asc::after,th.desc::after{content:''!important}
</style>
</head>
<body>

<!-- ══ TOP BAR ══ -->
<div class="topbar">
  <div class="logo">SIMANDOU <span>// SPARES</span> <span style="font-size:9px;background:#065f46;color:#fff;padding:2px 6px;border-radius:3px;margin-left:6px;letter-spacing:1px">READ ONLY</span></div>
  <div class="sep"></div>
  <div class="nav">
    <!-- Row 1: Main views -->
    <div class="nav-row">
      <div class="nav-grp">
        <span class="nav-grp-lbl">Views</span>
        <button class="tab tab-dash active" onclick="setView('dash')">Dashboard</button>
        <button class="tab tab-mm"   onclick="setView('mm')">Material Master</button>
        <button class="tab tab-abb"  onclick="setView('ABB')">ABB</button>
        <button class="tab tab-tak"  onclick="setView('TAKRAF')">TAKRAF</button>
        <button class="tab tab-pres" onclick="setView('pres')">Preservation</button>
        <button class="tab tab-log"  onclick="setView('log')">Issue Log <span id="n-log"></span></button>
      </div>
    </div>
    <!-- Row 2: Commodity filter (hidden on dash/log/pres) -->
    <div class="nav-row" id="comm-row" style="display:none">
      <div class="nav-grp">
        <span class="nav-grp-lbl">Filter</span>
        <button class="tab tab-all  active" onclick="setComm('ALL')">All <span id="cf-ALL"></span></button>
        <button class="tab tab-comm"        onclick="setComm('COMM')">COMM <span id="cf-COMM"></span></button>
        <button class="tab tab-ci"          onclick="setComm('CI')">CI <span id="cf-CI"></span></button>
        <button class="tab tab-ops"         onclick="setComm('2YR')">2YR OPS <span id="cf-2YR"></span></button>
        <button class="tab tab-st"          onclick="setComm('ST')">Spec Tools <span id="cf-ST"></span></button>
      </div>
    </div>
  </div>
  <div class="topbtns">
    <button class="btn btn-print" onclick="doPrint()">&#9113; Print</button>
    <button class="btn" onclick="exportCSV()">&#8595; CSV</button>
    <span style="font-size:11px;font-family:'Courier New',monospace;color:#065f46;background:#d1fae5;border:1.5px solid #6ee7b7;border-radius:6px;padding:6px 12px;font-weight:700;letter-spacing:.5px">&#128274; READ ONLY</span>
  </div>
</div>

<div class="content" id="app"></div>

<!-- ADD/EDIT MODAL -->
<div class="ov" id="ov-edit">
<div class="modal">
  <h2 id="mtitle">ADD RECORD</h2>
  <div class="fgrid">
    <div class="fg"><label>Tag / Item No.</label><input id="f-tag" placeholder="e.g. TK-1.1 or 36"></div>
    <div class="fg"><label>Part Number</label><input id="f-pn" placeholder="OEM part number"></div>
    <div class="fg full"><label>Description</label><input id="f-desc" placeholder="Part description"></div>
    <div class="fg"><label>Commodity</label>
      <select id="f-comm">
        <option value="COMM">COMM – Commissioning</option>
        <option value="CI">CI – Capital Insurance</option>
        <option value="2YR">2YR OPS – 2-Year Operational</option>
        <option value="ST">ST – Special Tools</option>
      </select>
    </div>
    <div class="fg"><label>OEM / Supplier</label><input id="f-oem" placeholder="ABB / TAKRAF"></div>
    <div class="fg"><label>System</label><input id="f-sys" placeholder="e.g. MV GIS"></div>
    <div class="fg"><label>Sub System</label><input id="f-sub" placeholder="e.g. VN 22 - SCA"></div>
    <div class="fg"><label>Qty in Stock</label><input id="f-qty" type="number" placeholder="0" min="0"></div>
    <div class="fg"><label>Unit</label><input id="f-unit" placeholder="pcs / EA / SET"></div>
    <div class="fg"><label>Bin Location</label><input id="f-bin" placeholder="e.g. WH-A / Row-3"></div>
    <div class="fg"><label>Unit Cost (£)</label><input id="f-cost" type="number" step="0.01"></div>
    <div class="fg"><label>Lead Time (days)</label><input id="f-lt" type="number"></div>
    <div class="fg"><label>Country / Location</label><input id="f-loc"></div>
    <div class="fg"><label>Preservation?</label>
      <select id="f-pres"><option value="No">No</option><option value="Yes">Yes</option></select>
    </div>
    <div class="fg"><label>Pres. Interval / Doc</label><input id="f-pi"></div>
    <div class="fg full"><label>Notes / OEM Ref</label><textarea id="f-notes" rows="2"></textarea></div>
  </div>
  <div class="mact">
    <button class="mcancel" onclick="closeModals()">Cancel</button>
    <button class="msave" onclick="saveRec()">Save Record</button>
  </div>
</div>
</div>

<!-- ISSUE MODAL -->
<div class="ov" id="ov-issue">
<div class="modal narrow">
  <h2>&#9113; Issue Material</h2>
  <div class="stock-info">
    <div>
      <div class="stock-lbl">Item</div>
      <div style="font-size:13px;font-weight:600;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="iss-desc"></div>
      <div style="font-size:11px;color:var(--text3);font-family:'Courier New',monospace" id="iss-pn"></div>
    </div>
    <div style="margin-left:auto;text-align:right">
      <div class="stock-lbl">Qty in Stock</div>
      <div class="stock-val" id="iss-stock"></div>
      <div style="font-size:11px;color:var(--text3);font-family:'Courier New',monospace" id="iss-bin"></div>
    </div>
  </div>
  <div class="fgrid" style="grid-template-columns:1fr 1fr;gap:12px">
    <div class="fg"><label>Qty to Issue</label>
      <input id="iss-qty" type="number" min="1" placeholder="0" oninput="checkIssue()">
      <div class="issue-warn" id="iss-warn"></div>
    </div>

let db=RAW.map((r,i)=>({...r,_id:i,
  system:r.system||'',subsystem:r.subsystem||'',bin:r.bin||'',
  qty_stock:r.qty_stock!==undefined?r.qty_stock:(r.qty?parseInt(r.qty)||0:0)
}));
let issLog=[],nid=db.length;

// State
let view='dash';   // dash | mm | ABB | TAKRAF | pres | log
let commF='ALL';   // ALL | COMM | CI | 2YR | ST  (used in mm/ABB/TAKRAF views)
let q='',oemF='',sc=null,sd=1,pg=0,ei=null,issIdx=null;
const PS=100;

const CL={'COMM':'#2563eb','CI':'#7c3aed','2YR':'#059669','ST':'#d97706'};

const CN={'COMM':'Commissioning Spares','CI':'Capital Insurance Spares','2YR':'2-Year Operational Spares','ST':'Special Tools'};

// ── Navigation ──────────────────────────────────────────────────────────────
function setView(v){
  view=v; q=''; oemF=''; pg=0;
  // Row 1 tabs
  document.querySelectorAll('.tab-dash,.tab-mm,.tab-abb,.tab-tak,.tab-pres,.tab-log')
    .forEach(el=>el.classList.remove('active'));
  const map={dash:'.tab-dash',mm:'.tab-mm',ABB:'.tab-abb',TAKRAF:'.tab-tak',pres:'.tab-pres',log:'.tab-log'};
  document.querySelector(map[v])?.classList.add('active');
  // Show/hide commodity row
  const showComm=v==='mm'||v==='ABB'||v==='TAKRAF';
  document.getElementById('comm-row').style.display=showComm?'flex':'none';
  if(showComm){ commF='ALL'; updateCommTabs(); }
  render();
}

function setComm(c){
  commF=c; pg=0; q='';
  updateCommTabs(); render();
}

function updateCommTabs(){
  document.querySelectorAll('.tab-all,.tab-comm,.tab-ci,.tab-ops,.tab-st')
    .forEach(el=>el.classList.remove('active'));
  const map={'ALL':'.tab-all','COMM':'.tab-comm','CI':'.tab-ci','2YR':'.tab-ops','ST':'.tab-st'};
  document.querySelector(map[commF])?.classList.add('active');
  // Update counts
  const src=getViewSrc();
  const byC={ALL:src.length,COMM:0,CI:0,'2YR':0,ST:0};
  src.forEach(r=>byC[r.commodity]=(byC[r.commodity]||0)+1);
  ['ALL','COMM','CI','2YR','ST'].forEach(k=>{
    const el=document.getElementById('cf-'+k); if(el) el.textContent='('+byC[k]+')';
  });
}

// Returns the base source array for current view (before comm filter)
function getViewSrc(){
  if(view==='ABB')    return db.filter(r=>r.oem==='ABB');
  if(view==='TAKRAF') return db.filter(r=>r.oem==='TAKRAF');
  return db; // mm and dash use all
}

function updateLogCount(){
  const el=document.getElementById('n-log'); if(el) el.textContent='('+issLog.length+')';
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('app');
  if(view==='dash')   renderDash(el);
  else if(view==='pres') renderPres(el);
  else if(view==='log')  renderLog(el);
  else renderTabulation(el); // mm | ABB | TAKRAF
  updateLogCount();
  if(view==='mm'||view==='ABB'||view==='TAKRAF') updateCommTabs();
}

// ── DASHBOARD ───────────────────────────────────────────────────────────────
function renderDash(el){
  const byC={COMM:0,CI:0,'2YR':0,ST:0};
  const abbByC={COMM:0,CI:0,'2YR':0,ST:0};
  const takByC={COMM:0,CI:0,'2YR':0,ST:0};
  let abbCost=0,pres=0,zeroStock=0;
  db.forEach(r=>{
    byC[r.commodity]=(byC[r.commodity]||0)+1;
    if(r.oem==='ABB'){abbByC[r.commodity]=(abbByC[r.commodity]||0)+1;if(r.cost)abbCost+=parseFloat(r.cost)*(r.qty_stock||0);}
    if(r.oem==='TAKRAF')takByC[r.commodity]=(takByC[r.commodity]||0)+1;
    if(r.preservation==='Yes')pres++;
    if((r.qty_stock||0)===0)zeroStock++;
  });
  const mc=Math.max(...Object.values(byC));
  el.innerHTML=`
  <div class="metrics">
    <div class="metric hi"><div class="val">${db.length.toLocaleString()}</div><div class="lbl">Total Items</div></div>
    <div class="metric"><div class="val" style="color:#1d4ed8">${byC.COMM}</div><div class="lbl">Commissioning</div></div>
    <div class="metric"><div class="val" style="color:#6d28d9">${byC.CI}</div><div class="lbl">Cap. Insurance</div></div>
    <div class="metric"><div class="val" style="color:#047857">${byC['2YR']}</div><div class="lbl">2Yr Ops</div></div>
    <div class="metric"><div class="val" style="color:#b45309">${byC.ST}</div><div class="lbl">Spec. Tools</div></div>
    <div class="metric"><div class="val" style="color:#b91c1c">${zeroStock}</div><div class="lbl">Zero Stock</div></div>
    <div class="metric"><div class="val" style="color:#b91c1c">${pres}</div><div class="lbl">Preservation</div></div>
    <div class="metric hi"><div class="val" style="font-size:20px">£${(abbCost/1e6).toFixed(1)}M</div><div class="lbl">ABB Value</div></div>
  </div>

  <!-- ABB summary panel -->
  <div class="oem-banner" style="background:var(--abb-bg);border:1.5px solid var(--abb);margin-bottom:12px">
    <div>
      <div class="oem-name" style="color:var(--abb-t)">ABB Switzerland Ltd</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px">EPS 1, 2 &amp; 3 — Simandou Mine</div>
    </div>
    <div class="oem-stats">
      ${[['COMM',abbByC.COMM,'#1d4ed8'],['CI',abbByC.CI,'#6d28d9'],['2YR',abbByC['2YR'],'#047857']].map(([k,v,c])=>`
      <div class="oem-stat" onclick="setView('ABB');setComm('${k}')" style="cursor:pointer">
        <div class="sv" style="color:${c}">${v}</div>
        <div class="sl" style="color:var(--abb-t)">${k==='2YR'?'2YR OPS':k}</div>
      </div>`).join('')}
      <div class="oem-stat" style="cursor:pointer" onclick="setView('ABB')">
        <div class="sv" style="color:var(--abb-t)">${abbByC.COMM+abbByC.CI+abbByC['2YR']}</div>
        <div class="sl" style="color:var(--abb-t)">TOTAL</div>
      </div>
    </div>
  </div>

  <!-- TAKRAF summary panel -->
  <div class="oem-banner" style="background:var(--tak-bg);border:1.5px solid var(--tak);margin-bottom:16px">
    <div>
      <div class="oem-name" style="color:var(--tak-t)">TAKRAF</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px">Spares PPL &amp; Special Tools — Simandou Mine</div>
    </div>
    <div class="oem-stats">
      ${[['COMM',takByC.COMM,'#1d4ed8'],['CI',takByC.CI,'#6d28d9'],['2YR',takByC['2YR'],'#047857'],['ST',takByC.ST,'#b45309']].map(([k,v,c])=>`
      <div class="oem-stat" onclick="setView('TAKRAF');setComm('${k}')" style="cursor:pointer">
        <div class="sv" style="color:${c}">${v}</div>
        <div class="sl" style="color:var(--tak-t)">${k==='2YR'?'2YR OPS':k}</div>
      </div>`).join('')}
      <div class="oem-stat" style="cursor:pointer" onclick="setView('TAKRAF')">
        <div class="sv" style="color:var(--tak-t)">${takByC.COMM+takByC.CI+takByC['2YR']+takByC.ST}</div>
        <div class="sl" style="color:var(--tak-t)">TOTAL</div>
      </div>
    </div>
  </div>

  <div class="dash-row">
    <div class="panel"><div class="panel-title">Overall commodity breakdown</div>
      ${Object.entries(byC).map(([k,v])=>`<div class="bar-row" onclick="setView('mm');setComm('${k}')">
        <div class="bar-label">${k==='2YR'?'2YR OPS':k}</div>

            <span style="font-family:\'Courier New\',monospace;font-size:11px;color:var(--text3);min-width:85px">${l.ts.split(' ')[0]}</span>

    </div>
  </div>`;
}

function getFiltered(src){
  const ql=q.toLowerCase();
  return src.filter(r=>{
    if(oemF && (r.oem||r.manufacturer||'')!==oemF) return false;
    if(!ql) return true;
    return(r.description+r.pn+r.tag+r.system+r.subsystem+r.bin+r.notes).toLowerCase().includes(ql);
  });
}
function getSorted(arr){
  if(!sc)return arr;
  return[...arr].sort((a,b)=>{
    let av=a[sc]||'',bv=b[sc]||'';
    if(!isNaN(parseFloat(av))&&!isNaN(parseFloat(bv)))return(parseFloat(av)-parseFloat(bv))*sd;
    return av.toString().localeCompare(bv.toString())*sd;
  });
}
function srt(col){if(sc===col)sd=-sd;else{sc=col;sd=1;}render();}

// ── TABLE HTML ───────────────────────────────────────────────────────────────
function buildTable(rows, showOEM){
  if(!rows.length)return'<div class="empty">— No records found —</div>';
  const statBadge=r=>{
    const m=(r.notes||'').match(/Status:\s*([^|]+)/);if(!m)return'';
    const s=m[1].trim(),sl=s.toLowerCase();
    if(sl.includes('ship'))return`<span style="color:#065f46;background:#d1fae5;padding:1px 5px;border-radius:4px;font-size:11px;border:1px solid #6ee7b7">${s.substring(0,13)}</span> `;
    if(sl.includes('ready'))return`<span style="color:#78350f;background:#fef3c7;padding:1px 5px;border-radius:4px;font-size:11px;border:1px solid #fcd34d">${s.substring(0,13)}</span> `;
    if(sl.includes('deliver'))return`<span style="color:#1e3a8a;background:#dbeafe;padding:1px 5px;border-radius:4px;font-size:11px;border:1px solid #93c5fd">${s.substring(0,13)}</span> `;
    return'';
  };
  const ss=col=>sc===col?(sd===1?' asc':' desc'):'';

  // Column widths: [oem?] comm | tag | pn | desc | system | subsystem | bin | qty | uom | supplier | cost | pres | actions
  const cgMM=`<col style="width:50px"><col style="width:60px"><col style="width:56px"><col style="width:95px"><col style="width:155px"><col style="width:78px"><col style="width:72px"><col style="width:72px"><col style="width:48px"><col style="width:36px"><col style="width:65px"><col style="width:60px"><col style="width:44px"><col style="width:95px">`;
  const cgSingle=`<col style="width:60px"><col style="width:56px"><col style="width:100px"><col style="width:168px"><col style="width:82px"><col style="width:76px"><col style="width:78px"><col style="width:50px"><col style="width:36px"><col style="width:72px"><col style="width:62px"><col style="width:44px"><col style="width:112px">`;

  return`<div class="twrap"><table>
  <colgroup>${showOEM?cgMM:cgSingle}</colgroup>
  <thead><tr>
    ${showOEM?`<th onclick="srt('oem')" class="${ss('oem')}">OEM</th>`:''}
    <th onclick="srt('commodity')" class="${ss('commodity')}">Comm.</th>
    <th onclick="srt('tag')" class="${ss('tag')}">Tag</th>
    <th onclick="srt('pn')" class="${ss('pn')}">Part No.</th>
    <th onclick="srt('description')" class="${ss('description')}">Description</th>
    <th onclick="srt('system')" class="${ss('system')}">System</th>
    <th onclick="srt('subsystem')" class="${ss('subsystem')}">Sub System</th>
    <th onclick="srt('bin')" class="${ss('bin')}">Bin</th>
    <th onclick="srt('qty_stock')" class="${ss('qty_stock')}">Qty</th>
    <th>UOM</th>
    <th onclick="srt('manufacturer')" class="${ss('manufacturer')}">Supplier</th>
    <th onclick="srt('cost')" class="${ss('cost')}">Unit Cost</th>
    <th>Pres.</th>
    <th>Actions</th>
  </tr></thead><tbody>
  ${rows.map(r=>{
    const idx=db.findIndex(x=>x._id===r._id);
    const qs=parseInt(r.qty_stock)||0;
    const qCls=qs===0?'qty-zero':qs<=2?'qty-low':'';
    const cost=r.cost?'£'+parseFloat(r.cost).toLocaleString(undefined,{maximumFractionDigits:0}):'—';
    const oem=r.oem||r.manufacturer||'';
    return`<tr>
    ${showOEM?`<td><span class="b ${oem==='ABB'?'bABB':'bTAK'}">${oem}</span></td>`:''}
    <td><span class="b b${r.commodity}">${r.commodity}</span></td>
    <td style="font-size:12px;font-family:'Courier New',monospace;font-weight:600">${r.tag||''}</td>
    <td style="font-size:12px;font-family:'Courier New',monospace;color:#7c2d12;font-weight:600" title="${r.pn||''}">${r.pn||'—'}</td>
    <td style="font-weight:500" title="${(r.description||'').replace(/"/g,'')}">${r.description||''}</td>
    <td style="font-size:12px;color:var(--text2)" title="${r.system||''}">${r.system||'—'}</td>
    <td style="font-size:12px;color:var(--text3)" title="${r.subsystem||''}">${r.subsystem||'—'}</td>
    <td style="font-size:12px;font-family:'Courier New',monospace;color:#065f46;font-weight:600">${r.bin||'—'}</td>
    <td class="${qCls}" style="text-align:right;font-family:'Courier New',monospace;font-weight:700;font-size:14px">${qs}</td>
    <td style="font-size:12px;color:var(--text3)">${r.unit||''}</td>
    <td style="font-size:12px" title="${oem}">${oem.substring(0,12)}</td>
    <td style="text-align:right;font-family:'Courier New',monospace;font-weight:600;color:${r.cost?'#065f46':'var(--text3)'}">${cost}</td>
    <td>${r.preservation==='Yes'?'<span class="b bY">YES</span>':'<span class="b bN">NO</span>'}</td>
    <td style="color:var(--text3);font-size:11px;font-family:'Courier New',monospace">${statBadge(r)}</td>
    </tr>`;
  }).join('')}
  </tbody></table></div>`;
}

// ── ISSUE MODAL ───────────────────────────────────────────────────────────────
function openIssue(idx){
  issIdx=idx;const r=db[idx];
  document.getElementById('iss-desc').textContent=r.description||'';
  document.getElementById('iss-pn').textContent=(r.oem||r.manufacturer||'')+' · '+(r.pn||'No part number');
  const qs=parseInt(r.qty_stock)||0;
  document.getElementById('iss-stock').textContent=qs+' '+(r.unit||'');
  document.getElementById('iss-stock').style.color=qs===0?'#b91c1c':qs<=2?'#d97706':'#065f46';
  document.getElementById('iss-bin').textContent=r.bin?'Bin: '+r.bin:'No bin assigned';
  document.getElementById('iss-qty').value='';
  document.getElementById('iss-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('iss-to').value='';document.getElementById('iss-wo').value='';
  document.getElementById('iss-rem').value='';document.getElementById('iss-warn').textContent='';
  document.getElementById('ov-issue').classList.add('show');
}
function checkIssue(){
  const r=db[issIdx];const qs=parseInt(r.qty_stock)||0;
  const want=parseInt(document.getElementById('iss-qty').value)||0;
  const w=document.getElementById('iss-warn');
  if(want>qs)w.textContent=`⚠ Only ${qs} in stock`;
  else if(want<=0)w.textContent='⚠ Enter qty > 0';
  else if(qs-want===0)w.textContent='⚠ This will zero out stock';
  else w.textContent='';
}
function confirmIssue(){
  const r=db[issIdx];const qs=parseInt(r.qty_stock)||0;
  const want=parseInt(document.getElementById('iss-qty').value)||0;
  if(want<=0){alert('Enter a quantity to issue.');return;}
  if(want>qs){alert(`Cannot issue ${want} — only ${qs} in stock.`);return;}
  const ts=document.getElementById('iss-date').value+' '+new Date().toTimeString().substring(0,5);
  db[issIdx].qty_stock=qs-want;
  issLog.push({ts,oem:r.oem||r.manufacturer||'',tag:r.tag,pn:r.pn,desc:r.description,bin:r.bin,
    qtyIssued:want,qtyBefore:qs,qtyAfter:qs-want,
    issuedTo:document.getElementById('iss-to').value.trim(),
    wo:document.getElementById('iss-wo').value.trim(),
    remark:document.getElementById('iss-rem').value.trim()});
  closeModals();render();
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;right:24px;background:#065f46;color:#fff;padding:14px 20px;border-radius:8px;font-family:"Courier New",monospace;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2)';
  t.textContent=`✓ Issued ${want} × ${r.description.substring(0,30)} — Stock: ${qs-want} ${r.unit||''}`;
  document.body.appendChild(t);setTimeout(()=>t.remove(),4000);
}

function saveRec(){

    oem:o,manufacturer:o,system:document.getElementById('f-sys').value.trim(),

function delRec(i){if(!confirm('Delete this record?'))return;db.splice(i,1);render();}

        <td style="text-align:right;color:#b91c1c;font-weight:700">−${l.qtyIssued}</td><td style="text-align:right">${l.qtyBefore}</td>
        <td style="text-align:right;font-weight:700;color:${l.qtyAfter===0?'#b91c1c':'#047857'}">${l.qtyAfter}</td>
        <td>${l.issuedTo||'—'}</td><td>${l.wo||'—'}</td><td style="font-size:7pt">${l.remark||'—'}</td></tr>`).join('')}</tbody></table>`;
    } else if(s.pres){
      tbl=`<table><colgroup><col style="width:4%"><col style="width:5%"><col style="width:5%"><col style="width:22%"><col style="width:9%"><col style="width:9%"><col style="width:6%"><col style="width:4%"><col style="width:9%"><col style="width:22%"></colgroup>
      <thead><tr><th>OEM</th><th>Comm.</th><th>Tag</th><th>Description</th><th>System</th><th>Sub System</th><th>Bin</th><th>Qty</th><th>Supplier</th><th>Pres. Doc Ref.</th></tr></thead>
      <tbody>${s.rows.map((r,i)=>`<tr${i%2?` style="background:#f7f7f7"`:''}>
        <td><b>${r.oem||''}</b></td><td><b>${r.commodity}</b></td><td>${r.tag||''}</td><td>${r.description||''}</td>
        <td>${r.system||'—'}</td><td>${r.subsystem||'—'}</td><td style="color:#047857;font-weight:600">${r.bin||'—'}</td>
        <td style="text-align:right">${r.qty_stock||0}</td><td>${r.oem||r.manufacturer||''}</td>
        <td style="color:#6d28d9">${r.presinterval||'TBD'}</td></tr>`).join('')}</tbody></table>`;
    } else {
      tbl=`<table><colgroup><col style="width:5%"><col style="width:8%"><col style="width:19%"><col style="width:9%"><col style="width:9%"><col style="width:6%"><col style="width:4%"><col style="width:4%"><col style="width:8%"><col style="width:7%"><col style="width:9%"><col style="width:4%"><col style="width:4%"></colgroup>
      <thead><tr><th>Tag</th><th>Part Number</th><th>Description</th><th>System</th><th>Sub System</th><th>Bin</th><th>Qty</th><th>UOM</th><th>Supplier</th><th>Unit Cost</th><th>OEM Doc Ref</th><th>Location</th><th>Pres.</th></tr></thead>
      <tbody>${s.rows.map((r,i)=>{
        const cost=r.cost?'£'+parseFloat(r.cost).toLocaleString(undefined,{maximumFractionDigits:0}):'—';
        let doc=r.presinterval||'';if(doc.startsWith('Per OEM Doc – '))doc=doc.replace('Per OEM Doc – ','');
        return`<tr${i%2?` style="background:#f7f7f7"`:''}>
          <td>${r.tag||''}</td><td>${r.pn||'—'}</td><td>${r.description||''}</td>
          <td>${r.system||'—'}</td><td>${r.subsystem||'—'}</td>
          <td style="color:#047857;font-weight:600">${r.bin||'—'}</td>
          <td style="text-align:right;font-weight:700;color:${(r.qty_stock||0)===0?'#b91c1c':'#000'}">${r.qty_stock||0}</td>
          <td>${r.unit||''}</td><td>${r.oem||r.manufacturer||''}</td><td style="text-align:right">${cost}</td>
          <td style="font-size:7pt">${doc.substring(0,18)}</td><td>${(r.location||'—').substring(0,10)}</td>
          <td style="color:${r.preservation==='Yes'?'#c0392b':'#888'};font-weight:${r.preservation==='Yes'?700:400}">${r.preservation}</td></tr>`}).join('')}</tbody></table>`;
    }
    return`${si>0?'<div style="page-break-before:always"></div>':''}
    <div style="background:${s.col};color:#fff;padding:5pt 10pt;margin-bottom:6pt;font-size:10pt;font-weight:700;border-radius:3pt;-webkit-print-color-adjust:exact;print-color-adjust:exact">
      ${s.label} &nbsp;·&nbsp; ${s.rows.length} ${s.log?'transactions':'items'}</div>${tbl}`;
  }).join('');

  const total=sections.reduce((acc,s)=>acc+s.rows.length,0);
  return`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title>
  <style>@page{size:A4 landscape;margin:10mm 8mm 8mm 8mm}*{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,Helvetica,sans-serif;font-size:8.5pt;color:#000;background:#fff}
  .hdr{background:#1a1a2e;color:#fff;padding:6pt 10pt;margin-bottom:8pt;display:flex;align-items:center;justify-content:space-between;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ftr{border-top:0.5pt solid #ccc;margin-top:6pt;padding-top:3pt;font-size:6pt;color:#888;display:flex;justify-content:space-between}
  table{width:100%;border-collapse:collapse;font-size:7.5pt;margin-bottom:4pt;table-layout:fixed}
  th{background:#1a1a2e;color:#fff;padding:3pt 4pt;text-align:left;border:0.5pt solid #555;font-size:7pt;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td{padding:2.5pt 4pt;border:0.5pt solid #ccc;vertical-align:top}
  thead{display:table-header-group}tr{page-break-inside:avoid}</style></head><body>
  <div class="hdr">
    <div><div style="font-size:14pt;font-weight:700;letter-spacing:2pt">RIO TINTO</div>
    <div style="font-size:7pt;color:#aaa;margin-top:2pt">ICS DEPARTMENT  |  SIMANDOU PROJECT</div></div>
    <div style="text-align:center;font-size:11pt;font-weight:700">${title}</div>
    <div style="text-align:right;font-size:7pt;color:#aaa">Doc: RT-ICS-SPR-TAB-001<br>Date: ${dated}<br>Total: ${total} records</div>
  </div>${body}
  <div class="ftr"><span>CONFIDENTIAL — RIO TINTO ICS DEPARTMENT — SIMANDOU PROJECT</span><span>Uncontrolled when printed</span></div>
  </body></html>`;
}

// ── CSV ───────────────────────────────────────────────────────────────────────
function exportCSV(){
  if(view==='log'){exportLogCSV();return;}
  const src=view==='pres'?db.filter(r=>r.preservation==='Yes'):
            view==='ABB'?(commF==='ALL'?db.filter(r=>r.oem==='ABB'):db.filter(r=>r.oem==='ABB'&&r.commodity===commF)):
            view==='TAKRAF'?(commF==='ALL'?db.filter(r=>r.oem==='TAKRAF'):db.filter(r=>r.oem==='TAKRAF'&&r.commodity===commF)):
            (commF==='ALL'?db:db.filter(r=>r.commodity===commF));
  const h=['Tag','Part No','Description','Commodity','OEM','System','Sub System','Bin Location','Qty in Stock','Unit','Unit Cost','Lead Time','Location','Preservation','Pres. Interval','Notes','Added'];
  const rows=src.map(r=>[r.tag,r.pn,r.description,r.commodity,r.oem||r.manufacturer,r.system,r.subsystem,r.bin,r.qty_stock,r.unit,r.cost,r.leadtime,r.location,r.preservation,r.presinterval,r.notes,r.added]
    .map(v=>`"${(v===undefined||v===null?'':v).toString().replace(/"/g,'""')}"`).join(','));
  dl([h.join(','),...rows].join('\n'),`simandou_${view}_${new Date().toISOString().split('T')[0]}.csv`);
}
function exportLogCSV(){
  const h=['Date/Time','OEM','Tag','Part No','Description','Bin','Qty Issued','Qty Before','Qty After','Issued To','Work Order','Remarks'];
  const rows=issLog.map(l=>[l.ts,l.oem,l.tag,l.pn,l.desc,l.bin,l.qtyIssued,l.qtyBefore,l.qtyAfter,l.issuedTo,l.wo,l.remark]
    .map(v=>`"${(v===undefined||v===null?'':v).toString().replace(/"/g,'""')}"`).join(','));
  dl([h.join(','),...rows].join('\n'),`simandou_issue_log_${new Date().toISOString().split('T')[0]}.csv`);
}
function dl(csv,name){const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=name;a.click();}

document.getElementById('ov-edit').addEventListener('click',function(e){if(e.target===this)closeModals();});
document.getElementById('ov-issue').addEventListener('click',function(e){if(e.target===this)closeModals();});
render();
</script>
