<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simandou Spares (Read Only)</title>
<style>
:root{--bg:#f0f2f5;--sf:#fff;--sf2:#f8f9fb;--bd:#d0d5dd;--bd2:#a0aab8;--ac:#b45309;--tx:#0f1117;--tx2:#2d3748;--tx3:#5a6478}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:Georgia,serif;font-size:14px}
.topbar{background:var(--sf);border-bottom:2px solid var(--bd);padding:0 18px;display:flex;align-items:center;gap:10px;height:58px;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.logo{font-family:"Courier New",monospace;font-size:12px;font-weight:700;letter-spacing:3px;color:var(--ac)}
.logo span{color:var(--tx3)}
.sep{width:1px;height:28px;background:var(--bd);flex-shrink:0}
.nav{display:flex;flex-direction:column;flex:1;overflow:hidden}
.nr{display:flex;gap:3px;overflow-x:auto;padding:2px 0}
.nr::-webkit-scrollbar{height:0}
.tab{padding:5px 12px;font-size:11.5px;font-family:"Courier New",monospace;cursor:pointer;border-radius:5px;color:var(--tx2);background:none;border:1.5px solid transparent;white-space:nowrap;font-weight:600}
.tab:hover{background:var(--sf2);border-color:var(--bd)}
.tab.on{border-color:currentColor;font-weight:700}
.topbtns{display:flex;gap:8px;flex-shrink:0}
.btn{padding:7px 14px;background:var(--sf2);color:var(--tx2);border:1.5px solid var(--bd);border-radius:6px;font-size:12px;cursor:pointer;font-family:"Courier New",monospace;font-weight:600}
.btn:hover{background:var(--bd)}
.bpr{background:#065f46;color:#fff;border-color:#065f46}.bpr:hover{background:#047857}
.bad{background:#b45309;color:#fff;border-color:#b45309}.bad:hover{background:#92400e}
.content{padding:16px 18px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px;margin-bottom:18px}
.metric{background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:12px}
.metric .v{font-size:26px;font-weight:700;font-family:"Courier New",monospace}
.metric .l{font-size:10px;letter-spacing:1px;color:var(--tx3);text-transform:uppercase;margin-top:3px;font-family:"Courier New",monospace}
.metric.hi{border-color:#b45309}.metric.hi .v{color:#b45309}
.drow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.panel{background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:14px}
.ptit{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);font-family:"Courier New",monospace;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--bd)}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer}
.blbl{width:100px;color:var(--tx2);flex-shrink:0;font-size:13px}
.btrk{flex:1;background:var(--bg);border-radius:3px;height:7px;overflow:hidden;border:1px solid var(--bd)}
.bfil{height:100%;border-radius:3px}
.bnum{width:36px;text-align:right;color:var(--tx3);font-size:12px;font-family:"Courier New",monospace}
.obox{border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.onm{font-size:18px;font-weight:700;font-family:"Courier New",monospace}
.osts{display:flex;gap:14px}
.ost{text-align:center;cursor:pointer}
.ost .sv{font-size:20px;font-weight:700;font-family:"Courier New",monospace}
.ost .sl{font-size:10px;text-transform:uppercase;font-family:"Courier New",monospace;opacity:.8}
.toolbar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.srch{flex:1;min-width:180px;position:relative}
.srch input{width:100%;padding:9px 12px 9px 32px;background:var(--sf);border:1.5px solid var(--bd);border-radius:7px;color:var(--tx);font-family:Georgia,serif;font-size:14px}
.srch input:focus{outline:none;border-color:#b45309}
.srch input::placeholder{color:var(--tx3)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:14px;pointer-events:none}
.fsel{padding:9px 12px;background:var(--sf);border:1.5px solid var(--bd);border-radius:7px;color:var(--tx2);font-family:Georgia,serif;font-size:14px}
.rc{font-size:13px;color:var(--tx3);font-family:"Courier New",monospace}
.twrap{overflow-x:auto;border:1.5px solid var(--bd);border-radius:10px;background:var(--sf)}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;min-width:1100px}
th{text-align:left;padding:9px 7px;font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--tx2);background:var(--sf2);border-bottom:2px solid var(--bd);white-space:nowrap;font-weight:700;cursor:pointer;user-select:none;font-family:"Courier New",monospace}
th:hover{background:var(--bd)}
th.asc::after{content:" ▲"}th.desc::after{content:" ▼"}
td{padding:8px 7px;border-bottom:1px solid var(--bd);color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
tr:hover td{background:#fefce8}
tr:nth-child(even) td{background:var(--sf2)}
tr:nth-child(even):hover td{background:#fefce8}
tr:last-child td{border-bottom:none}
.qz{color:#b91c1c!important;font-weight:700!important;background:#fee2e2!important}
.ql{color:#b45309!important;font-weight:700!important}
.b{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:700;font-family:"Courier New",monospace}
.bCO{background:#dbeafe;color:#1e3a8a;border:1.5px solid #93c5fd}
.bCI{background:#ede9fe;color:#4c1d95;border:1.5px solid #c4b5fd}
.b2Y{background:#d1fae5;color:#064e3b;border:1.5px solid #6ee7b7}
.bST{background:#fef3c7;color:#78350f;border:1.5px solid #fcd34d}
.bY{background:#fee2e2;color:#991b1b;border:1.5px solid #fca5a5;font-size:11px;padding:1px 5px}
.bN{background:#f1f5f9;color:var(--tx3);border:1.5px solid var(--bd);font-size:11px;padding:1px 5px}
.bAB{background:#e0f0ff;color:#003d6b;border:1.5px solid #93c5fd;font-size:10px}
.bTK{background:#fff0e8;color:#7a2800;border:1.5px solid #fdba74;font-size:10px}
.abtn{padding:3px 7px;font-size:11px;border-radius:4px;cursor:pointer;font-family:"Courier New",monospace;font-weight:600;border:1.5px solid var(--bd);background:var(--sf2);color:var(--tx2)}
.abtn:hover{background:var(--bd)}
.abtn.del:hover{background:#fee2e2;border-color:#fca5a5;color:#b91c1c}
.abtn.iss{background:#dbeafe;border-color:#93c5fd;color:#1e3a8a}
.abtn.iss:hover{background:#1d4ed8;color:#fff}
.empty{text-align:center;padding:48px;color:var(--tx3)}
.pager{display:flex;align-items:center;gap:10px;padding:10px 0;font-size:13px;color:var(--tx3)}
.pbtn{padding:6px 14px;background:var(--sf);border:1.5px solid var(--bd);border-radius:6px;color:var(--tx2);cursor:pointer;font-family:"Courier New",monospace;font-size:12px}
.pbtn:hover:not(:disabled){background:var(--bd)}
.pbtn:disabled{opacity:.4;cursor:default}
.pinfo{flex:1;text-align:center;font-family:"Courier New",monospace}
.pcard{background:var(--sf);border:1.5px solid var(--bd);border-radius:8px;padding:9px 12px;margin-bottom:7px;display:flex;align-items:center;gap:9px}
.pcard:hover{background:#fffbeb}
.pdsc{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pint{font-size:11px;color:#7c2d12;background:#fff7ed;border:1.5px solid #fb923c;border-radius:4px;padding:2px 7px;min-width:120px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;font-family:"Courier New",monospace}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.ov.show{display:flex}
.modal{background:var(--sf);border:1.5px solid var(--bd2);border-radius:12px;padding:22px;width:620px;max-width:95vw;max-height:90vh;overflow-y:auto}
.nw{width:440px}
.mh{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#b45309;margin-bottom:16px;font-family:"Courier New",monospace}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fi{display:flex;flex-direction:column;gap:4px}
.fw{grid-column:1/-1}
.fi label{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);font-family:"Courier New",monospace;font-weight:700}
.fi input,.fi select,.fi textarea{padding:8px 10px;background:var(--sf2);border:1.5px solid var(--bd);border-radius:7px;color:var(--tx);font-family:Georgia,serif;font-size:14px}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:#b45309}
.fi textarea{resize:vertical;min-height:48px}
.ma{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.mc{padding:8px 14px;background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx2);border-radius:7px;cursor:pointer;font-family:"Courier New",monospace;font-size:13px}
.ms{padding:8px 20px;background:#b45309;color:#fff;border:none;border-radius:7px;cursor:pointer;font-family:"Courier New",monospace;font-size:13px;font-weight:700}
.mi{padding:8px 20px;background:#1d4ed8;color:#fff;border:none;border-radius:7px;cursor:pointer;font-family:"Courier New",monospace;font-size:13px;font-weight:700}
.sib{background:var(--sf2);border:1.5px solid var(--bd);border-radius:8px;padding:11px 13px;margin-bottom:13px;display:flex;align-items:center;gap:14px}
.svb{font-size:22px;font-weight:700;font-family:"Courier New",monospace}
.slb{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;font-family:"Courier New",monospace}
.iw{color:#b91c1c;font-size:12px;font-family:"Courier New",monospace;margin-top:5px;min-height:16px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
</style>
</head>
